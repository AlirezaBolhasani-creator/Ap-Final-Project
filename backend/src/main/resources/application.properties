spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:sqlite:divar.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# No default here on purpose: the app must be given a real secret, either via
# the JWT_SECRET environment variable or a local-only application-local.properties
# (see application-local.properties.example). Startup fails fast if neither is set.
jwt.secret=${JWT_SECRET}

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB
